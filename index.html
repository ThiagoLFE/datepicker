<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Count</title>
        <link href="./output.css" rel="stylesheet" />
    </head>
    <body>
        <main class="flex flex-col items-center justify-center mt-20 gap-10">
            <h1 class="text-3xl uppercase tracking-wider">Input mask</h1>
            <div class="border border-gray-500 w-200 flex p-10 gap-10">
                <div>
                    <span>Aniversário</span>
                    <input
                        id="date"
                        type="text"
                        class="input w-full"
                        placeholder="Digite seu aniversário"
                    />
                </div>
            </div>

            <!--POPOVER-->
            <div id="popover-root" class="relative">
                <button id="popover-trigger" class="btn">Abrir popover</button>

                <div
                    id="popover-content"
                    class="hidden absolute top-full left-0 mt-2 w-64 rounded border border-gray-300 bg-white p-4 shadow"
                >
                    <p>Olá, eu sou um popover simples.</p>
                </div>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
