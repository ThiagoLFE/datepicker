<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Date Picker</title>
        <link href="./output.css" rel="stylesheet" />
    </head>
    <body>
        <main class="mt-20 flex justify-center">
            <div id="popover-root" class="relative w-80">
                <div class="flex gap-2">
                    <input
                        id="date"
                        type="text"
                        class="input w-full"
                        placeholder="DD/MM/AAAA"
                    />
                    <button id="popover-trigger" class="btn">📅</button>
                </div>

                <div
                    id="popover-content"
                    class="hidden absolute z-50 w-80 rounded-xl border border-base-300 bg-base-100 p-4 shadow-xl"
                >
                    <div class="mb-4 flex items-center justify-between">
                        <button id="prev-month" class="btn btn-sm">←</button>
                        <span id="calendar-title" class="font-semibold"></span>
                        <button id="next-month" class="btn btn-sm">→</button>
                    </div>

                    <div
                        class="mb-2 grid grid-cols-7 text-center text-sm font-medium opacity-70"
                    >
                        <span>Dom</span>
                        <span>Seg</span>
                        <span>Ter</span>
                        <span>Qua</span>
                        <span>Qui</span>
                        <span>Sex</span>
                        <span>Sáb</span>
                    </div>

                    <div
                        id="calendar-grid"
                        class="grid grid-cols-7 gap-1"
                    ></div>
                </div>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
