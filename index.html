<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Count</title>
        <link href="./output.css" rel="stylesheet" />
    </head>
    <body>
        <main class="flex flex-col items-center justify-center mt-20 gap-10">
            <h1 class="text-3xl uppercase tracking-wider">Input mask</h1>
            <div class="border border-gray-500 w-200 flex p-10 gap-10">
                <div>
                    <span>Aniversário</span>
                    <input
                        id="date"
                        type="text"
                        class="input w-full"
                        placeholder="Digite seu aniversário"
                    />
                </div>
            </div>

            <!--POPOVER-->
            <div id="popover-root" class="relative inline-block">
                <button id="popover-trigger" class="btn">
                    Abrir calendário
                </button>

                <div
                    id="popover-content"
                    class="hidden absolute z-50 w-80 rounded-xl border border-base-300 bg-base-100 p-4 shadow-xl"
                >
                    <p class="font-medium">Popover base</p>
                    <p class="text-sm opacity-70">
                        Aqui depois entra o calendário.
                    </p>
                </div>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
